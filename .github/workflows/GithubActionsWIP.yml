name: GithubActionsWIP

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

env:
  appName: "website-2203-blazor-server-wip"
  project: "Website/Website/Website.csproj"
  registryName: "dioptraregistry"

jobs:
  ############################################################################################################
  # These jobs are used to gate actions. By creating these jobs we don't need to proliferate the repo checks
  ############################################################################################################
  build-allowed:
    name: Build allowed
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Nothing to see here
        run: echo ""

  deployment-allowed-dioptra:
    name: Perform deployment because running on Dioptra/Website.2203 and user is not dependabot?
    needs: [build-allowed]
    runs-on: ubuntu-latest
    if: github.repository == 'Dioptra/Website.2203'
    steps:
      - name: Nothing to see here
        run: echo ""

  build-allowed-fork:
    name: Skip deployment because not running on Dioptra/Website.2203 or user is dependabot?
    needs: [build-allowed]
    runs-on: ubuntu-latest
    if: github.repository != 'Dioptra/Website.2203'
    steps:
      - name: Nothing to see here
        run: echo ""

  ############################################################################################################
  # Set unified suffix for the deployed application
  ############################################################################################################
  set-suffix:
    name: Create the date based suffix
    needs: [deployment-allowed-dioptra]
    runs-on: ubuntu-latest
    outputs:
      outputSuffix: ${{ steps.setSuffix.outputs.GlobalSuffix }}

    steps:
      - id: setSuffix
        run: echo "GlobalSuffix=$(date +'%Y-%m-%d--%H-%M-%S')--WIP" >> $GITHUB_OUTPUT
        shell: bash

  ############################################################################################################
  # Build website on forks
  ############################################################################################################
  build-website-fork:
    name: Build Website for forks/dependabot
    needs: [build-allowed-fork]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository under $GITHUB_WORKSPACE so the job can access it 🛎️
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup dotnet
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "10.0.300"

      - name: Authenticate to GitHub Packages
        run: |
          if dotnet nuget list source | grep -q "github-materia"; then
            dotnet nuget update source "github-materia" \
              --username github-actions \
              --password "${{ secrets.MATERIA_NUGET_AUTH_TOKEN }}" \
              --store-password-in-clear-text
          else
            dotnet nuget add source "https://nuget.pkg.github.com/materia-technologies-inc/index.json" \
              --name "github-materia" \
              --username github-actions \
              --password "${{ secrets.MATERIA_NUGET_AUTH_TOKEN }}" \
              --store-password-in-clear-text
          fi

      - name: Build Website
        run: dotnet build ${{env.project}} --configuration Release

  ############################################################################################################
  # Build website container on Dioptra
  ############################################################################################################
  build-website:
    name: Build Website
    needs: [set-suffix, deployment-allowed-dioptra]
    runs-on: ubuntu-latest

    steps:
      - name: Retrieve the global suffix
        run: echo "suffix=${{needs.set-suffix.outputs.outputSuffix}}" >> $GITHUB_ENV
        shell: bash

      - name: Checkout repository under $GITHUB_WORKSPACE so the job can access it 🛎️
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup dotnet
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "10.0.300"

      - name: Authenticate to GitHub Packages
        run: |
          if dotnet nuget list source | grep -q "github-materia"; then
            dotnet nuget update source "github-materia" \
              --username github-actions \
              --password "${{ secrets.MATERIA_NUGET_AUTH_TOKEN }}" \
              --store-password-in-clear-text
          else
            dotnet nuget add source "https://nuget.pkg.github.com/materia-technologies-inc/index.json" \
              --name "github-materia" \
              --username github-actions \
              --password "${{ secrets.MATERIA_NUGET_AUTH_TOKEN }}" \
              --store-password-in-clear-text
          fi

      - name: "Build and push docker container"
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - run: dotnet publish ${{env.project}} --os linux --arch x64 --configuration Release -p:PublishProfile=DefaultContainer -p:Version=${{ env.suffix }} -p:ContainerRegistry=${{env.registryname}} -p:ContainerRepository=${{env.appName}} -p:ContainerImageTag=${{ env.suffix }} --self-contained
