name: Build Website release workflow

on:
  push:
    tags:
      - "*"

jobs:
  check-repo:
    name: Verify repository
    runs-on: ubuntu-latest
    if: github.repository == 'Dioptra/Website.2203'
    steps:
      - run: echo "Running on Dioptra/Website.2203"

  build-tags:
    name: Set version tag
    runs-on: ubuntu-latest

    steps:
      - id: build
        run: |
          echo "tag=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT
          echo "dated-tag=$(date +'%Y-%m-%d--%H-%M-%S')--${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT
      - id: show
        run: |
          echo "Tag:        ${{ steps.build.outputs.tag }}"
          echo "Dated Tag:  ${{ steps.build.outputs.dated-tag }}"

    outputs:
      tag: ${{ steps.build.outputs.tag }}
      dated-tag: ${{ steps.build.outputs.dated-tag }}

  build:
    name: Build and publish
    needs: [build-tags, check-repo]
    uses: ./.github/workflows/build-pipeline.yml
    with:
      dated-tag: ${{ needs.build-tags.outputs.dated-tag }}
      image-name: website-2203
      create-github-release: true
      release-tag: ${{ needs.build-tags.outputs.tag }}
    secrets:
      REGISTRY_LOGIN_SERVER: ${{ secrets.REGISTRY_LOGIN_SERVER }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      MATERIA_NUGET_AUTH_TOKEN: ${{ secrets.MATERIA_NUGET_AUTH_TOKEN }}